<!-- Header banner -->
<div class="header-banner">
  <div class="container">
    <h1 class="header-title">
      <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
    </h1>
    {% if site.tagline %}
    <p class="header-tagline">{{ site.tagline }}</p>
    {% endif %}
    {% if site.explanation %}
    <p class="header-explanation">{{ site.explanation }}</p>
    {% endif %}
  </div>
</div>

<!-- Navigation -->
<nav class="site-nav">
  <div class="container">
    <a class="nav-link" href="{{ '/' | relative_url }}">Home</a>
    <a class="nav-link" href="{{ '/about' | relative_url }}">About</a>
    <a class="nav-link" href="{{ '/blog' | relative_url }}">Blog</a>
    <a class="nav-link" href="{{ '/contact' | relative_url }}">Contact</a>
  </div>
</nav>
